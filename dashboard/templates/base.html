<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Weir{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0D0D14;
      --bg-card:      #11111C;
      --bg-hover:     #14142A;
      --border:       #1E1E30;
      --border-lit:   #2E2E48;
      --text:         #E8E8F2;
      --text-muted:   #5A5A7A;
      --text-dim:     #3A3A58;
      --red:          #E94560;
      --red-dim:      #3A1020;
      --green:        #2ECC71;
      --green-dim:    #0A2E18;
      --amber:        #F0A020;
      --grey:         #4A4A6A;
      --font-head:    'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-head);
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-logo::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .nav-user {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-user a:hover { color: var(--text); }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/intercepts" class="nav-logo">Weir</a>
    {% if email is defined and email %}
    <div class="nav-user">
      <span>{{ email }}</span>
      <a href="/auth/logout">logout</a>
    </div>
    {% endif %}
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
